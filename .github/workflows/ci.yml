name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build

      - name: Lint
        id: lint
        continue-on-error: true
        run: pnpm run lint

      - name: Format
        id: format
        continue-on-error: true
        run: pnpm run format

      - name: Test
        id: test
        continue-on-error: true
        run: pnpm run test

      - name: Job Summary
        if: always()
        run: |
          lint="${{ steps.lint.outcome }}"
          format="${{ steps.format.outcome }}"
          test="${{ steps.test.outcome }}"

          result_icon() {
            case "$1" in
              success) echo "✅ Passed" ;;
              failure) echo "❌ Failed" ;;
              skipped) echo "⏭️ Skipped" ;;
              *)       echo "❓ Unknown" ;;
            esac
          }

          {
            echo "## CI Check Results"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| Lint | $(result_icon $lint) |"
            echo "| Format | $(result_icon $format) |"
            echo "| Test | $(result_icon $test) |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$lint" != "success" ] || [ "$format" != "success" ] || [ "$test" != "success" ]; then
            exit 1
          fi
